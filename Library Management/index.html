<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <h1 class="heading">Library Management System</h1>
        <div class="inputBox">
            <input id="bookName" type="text" placeholder="Enter The Book Name">
            <input id="bookAuthor" type="text" placeholder="Enter The Author Name">
        </div>
        <button onclick="saveNote()" class="btn" id="saveBtn">Add Book</button>
        <div class="boxButton">
            <input type="search" name="" id="search">
            <button onclick="searchBook()">Search</button>
        </div>
    </div>
    

    <table border="1">
        <thead>
            <tr>
                <th>S.No</th>
                <th>Book Name</th>
                <th>Author</th>
                <th>Action</th>
            </tr>
        </thead>

    <tbody id="bookManager">

    </tbody>
</table>

    <script src="script.js"></script>
</body>
</html>
